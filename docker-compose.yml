version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aiop_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiop_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aiop_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiop} -d ${POSTGRES_DB:-aiop_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    container_name: aiop_mlflow
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiop_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiop}:${POSTGRES_PASSWORD:-aiop_secret}@postgres:5432/${POSTGRES_DB:-aiop_db}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiop_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

volumes:
  postgres_data:
  upload_data:
  mlflow_data:
