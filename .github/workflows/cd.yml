name: CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: aiop-backend
  ECR_FRONTEND_REPO: aiop-frontend
  ECS_CLUSTER: aiop-cluster
  ECS_BACKEND_SERVICE: aiop-backend-service
  ECS_FRONTEND_SERVICE: aiop-frontend-service

jobs:
  # ─── Build & Push to ECR ──────────────────────────────────────────────────
  push-images:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          # Also tag as latest
          docker tag $IMAGE $ECR_REGISTRY/$ECR_BACKEND_REPO:latest
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build & push frontend
        id: build-frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG
          docker build -t $IMAGE ./frontend
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ─── Deploy Backend to ECS ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to ECS
    runs-on: ubuntu-latest
    needs: push-images

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition aiop-backend \
            --query taskDefinition \
            > infra/ecs/backend-task-def.json

      - name: Inject new image into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs/backend-task-def.json
          container-name: aiop-backend
          image: ${{ needs.push-images.outputs.backend-image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:  ${{ steps.task-def.outputs.task-definition }}
          service:          ${{ env.ECS_BACKEND_SERVICE }}
          cluster:          ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ─── Deploy Frontend to ECS ───────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to ECS
    runs-on: ubuntu-latest
    needs: [push-images, deploy-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition aiop-frontend \
            --query taskDefinition \
            > infra/ecs/frontend-task-def.json

      - name: Inject new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs/frontend-task-def.json
          container-name: aiop-frontend
          image: ${{ needs.push-images.outputs.frontend-image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:  ${{ steps.task-def.outputs.task-definition }}
          service:          ${{ env.ECS_FRONTEND_SERVICE }}
          cluster:          ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ─── Notify ───────────────────────────────────────────────────────────────
  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ needs.deploy-backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.deploy-frontend.result }}" >> $GITHUB_STEP_SUMMARY
